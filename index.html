<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeasonForge</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
    <link rel="icon" href="./assets/favicon.png" type="image/png" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__logo-block">
        <div class="app-header__icon" style="padding: 0; overflow: hidden; background: transparent; border: none;">
          <img src="./assets/favicon.png" alt="SeasonForge Icon" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;" />
        </div>
        <div>
          <h1 class="app-header__title">SeasonForge</h1>
          <p class="app-header__subtitle">Мониторинг текущих и будущих сезонов главных ролевых экшенов</p>
        </div>
      </div>
      <div class="app-header__meta">
        <div class="app-header__meta-item">
          <span class="app-header__meta-label">Последнее обновление</span>
          <strong id="last-updated-time">18 Июля 2026 • 14:40 UTC</strong>
        </div>
        <div class="app-header__meta-item">
          <span class="app-header__meta-label">Источник данных</span>
          <strong>Official Game Feeds</strong>
        </div>
      </div>
    </header>

    <div class="app-layout">
      <aside id="navbar"></aside>
      <main id="content"></main>
    </div>

    <footer class="app-footer">
      <span>© 2026 SeasonForge. Автоматический мониторинг ARPG сезонов.</span>
    </footer>

    <div id="toast-root"></div>
    <div id="modal-root"></div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>

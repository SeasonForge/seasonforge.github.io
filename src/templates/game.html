<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{GAME_NAME}} - SeasonForge</title>
    <meta name="description" content="Detailed season information, timeline, and features for {{GAME_NAME}}." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{GAME_NAME}} - SeasonForge" />
    <meta property="og:description" content="Detailed season info, highlights, and timeline history for {{GAME_NAME}}." />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{GAME_NAME}} - SeasonForge" />
    <meta name="twitter:description" content="Detailed season info, highlights, and timeline history for {{GAME_NAME}}." />

    <link rel="stylesheet" href="../../src/styles/main.css" />
    <link rel="icon" href="../../assets/favicon.png" type="image/png" />
  </head>
  <body>
    <header class="app-header">
      <a href="../../index.html" class="app-header__logo-block" style="text-decoration: none; color: inherit;">
        <div class="app-header__icon" style="padding: 0; overflow: hidden; background: transparent; border: none;">
          <img src="../../assets/favicon.png" alt="SeasonForge Icon" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;" />
        </div>
        <div>
          <h1 class="app-header__title">SeasonForge</h1>
          <p class="app-header__subtitle" id="app-header-subtitle">Monitoring current and upcoming seasons of major action RPGs</p>
        </div>
      </a>
      <div class="app-header__right-block" style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
        <div class="app-header__meta">
          <div class="app-header__meta-item">
            <span class="app-header__meta-label" id="lbl-last-updated">Last updated</span>
            <strong id="last-updated-time">-</strong>
          </div>
          <div class="app-header__meta-item">
            <span class="app-header__meta-label" id="lbl-data-source">Data source</span>
            <strong id="lbl-source-value">Official Game Feeds</strong>
          </div>
        </div>
        <div id="lang-switcher" class="lang-switcher"></div>
      </div>
    </header>

    <div class="app-layout" style="display: flex; flex-direction: column; gap: 1rem; max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem;">
      <nav class="breadcrumbs" id="breadcrumbs" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: #9ca3af; margin-bottom: 0.5rem;">
        <a href="../../index.html" class="breadcrumbs__link" id="breadcrumbs-home" style="color: var(--color-primary, #6366f1); text-decoration: none; transition: opacity 0.2s;">Home</a>
        <span class="breadcrumbs__separator" style="opacity: 0.5;">/</span>
        <span class="breadcrumbs__link" id="breadcrumbs-games" style="color: #9ca3af;">Games</span>
        <span class="breadcrumbs__separator" style="opacity: 0.5;">/</span>
        <span class="breadcrumbs__current" style="color: #f3f4f6; font-weight: 500;">{{GAME_NAME}}</span>
      </nav>

      <main class="game-page-content" id="game-page-root" data-game-id="{{GAME_ID}}" style="width: 100%;">
        {{GAME_CARD_HTML}}
      </main>
    </div>

    <footer class="app-footer">
      <span id="lbl-footer-text">© 2026 SeasonForge. Автоматический мониторинг ARPG сезонов.</span>
    </footer>

    <div id="toast-root"></div>
    <div id="modal-root"></div>
    <script type="module" src="../../src/game-page.js"></script>
  </body>
</html>
